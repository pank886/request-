- baseInfo:
    api_name: 入场
    url: /park-access-parking-rule-new/mock/access/enter
    method: post
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 车辆进场
      json:
        carNumber: ${get_extract_data_list(carNumber, 0)}
        time: 2026-05-27 14:33
        deviceCode: 001
      input_extract:
        # JSONPath 方式
        carInNumber: "$.json.carNumber"
      validation:
        - eq: {'openGate': 'true'}