- baseInfo:
    api_name: 获取车牌最新账单
    url: /mock/bill/latest
    method: post
    header:
      Content-Type: application/json;charset=UTF-8
  testCase:
    - case_name: 车辆费用查询
      json:
        carNumber: ${get_extract_data_list(carInNumber, 0)}
      validation:
        - eq: {'paid': 'true'}
        - eq: {'payableAmount':'20'}